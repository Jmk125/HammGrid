<!DOCTYPE html>
<title>HammGrid</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0f2b46">
<body>
  <div class="topbar" id="topbar"></div>
  <div class="app-shell">
    <div class="sidebar" id="sidebar"></div>
    <div class="shell-content">
      <main class="wide">
        <div class="row" style="justify-content: space-between; margin-bottom: 14px;">
          <div class="doc-breadcrumb" id="breadcrumb"></div>
          <div class="row" id="doc-actions" style="display:none;">
            <button id="edit-mode-btn" type="button">Edit</button>
            <button id="new-folder-btn" type="button">+ Folder</button>
            <button class="primary" id="upload-btn" type="button">+ Upload</button>
          </div>
        </div>

        <div class="card doc-dropzone" id="doc-dropzone">
          <table id="doc-table">
            <thead>
              <tr><th></th><th>Name</th><th>Revision</th><th>Issued</th><th>Uploaded</th><th>Links</th><th></th></tr>
            </thead>
            <tbody></tbody>
          </table>
          <p class="muted" id="empty-msg" style="display:none; padding: 8px;">This folder is empty. Drag &amp; drop PDFs anywhere in this area to upload.</p>
          <div class="doc-dropzone-hint" id="doc-dropzone-hint">Drop PDFs here to upload</div>
        </div>
      </main>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script type="module" src="/js/documents.js"></script>
  <script type="module" src="/js/pwa.js"></script>
</body>
