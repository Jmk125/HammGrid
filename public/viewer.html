<title>HammGrid</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0f2b46">
<body>
  <div class="topbar" id="topbar"></div>
  <div class="app-shell">
    <div class="sidebar" id="sidebar"></div>
    <div class="shell-content">
      <main class="wide">
        <div class="row" style="justify-content: space-between; margin-bottom: 10px;">
          <h1 id="project-name" style="margin:0;"></h1>
          <div class="row">
            <input type="text" id="search-filter" placeholder="Search sheet number or title..." style="width:220px;">
            <label>Discipline:
              <select id="discipline-filter"><option value="">All</option></select>
            </label>
            <label>Revision:
              <select id="revision-filter"><option value="">All (current set)</option></select>
            </label>
          </div>
        </div>

        <div id="grid" class="grid"></div>
        <p class="muted" id="empty-msg" style="display:none;">No sheets match these filters.</p>
        <p class="muted" id="sync-status"></p>
      </main>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script type="module" src="/js/viewer.js"></script>
  <script type="module" src="/js/pwa.js"></script>
</body>
