<title>Projects — Drawing App</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#2563eb">
<body>
  <header>
    <a href="/dashboard.html">Drawing App</a>
    <div class="row">
      <span id="whoami" class="muted"></span>
      <button id="logout">Sign out</button>
    </div>
  </header>
  <main>
    <div class="card" id="new-project-card" style="display:none;">
      <h2>New project</h2>
      <form id="new-project-form" class="row">
        <input id="project-name" placeholder="Project name" required>
        <input id="project-number" placeholder="Project number">
        <button class="primary" type="submit">Create</button>
      </form>
    </div>

    <div class="card">
      <h2>Projects</h2>
      <table id="projects-table">
        <thead><tr><th>Name</th><th>Number</th><th>Created</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script type="module" src="/js/pwa.js"></script>
</body>
