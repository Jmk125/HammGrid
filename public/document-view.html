<!DOCTYPE html>
<title>Document — HammGrid</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0f2b46">
<body>
  <div class="topbar" id="topbar">
    <div class="row" style="gap:6px;">
      <button id="back-btn" type="button">&larr; Back</button>
      <button id="download-doc-btn" class="icon-btn" type="button" title="Download">⬇</button>
      <a class="brand" href="/dashboard.html">HammGrid</a>
    </div>
    <div class="row">
      <span id="doc-label" class="muted"></span>
      <span id="whoami" class="muted"></span>
      <button id="logout" type="button">Sign out</button>
    </div>
  </div>
  <main class="wide">
    <div class="zoom-wrap" id="zoom-wrap" style="height: 88vh;">
      <div class="zoom-pan-inner" id="zoom-pan-inner">
        <canvas id="pdf-canvas"></canvas>
      </div>
    </div>
    <p class="muted" id="pdf-status"></p>
  </main>
  <script src="/js/api.js"></script>
  <script type="module" src="/js/document-view.js"></script>
  <script type="module" src="/js/pwa.js"></script>
</body>
