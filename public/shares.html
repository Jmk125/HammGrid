<!DOCTYPE html>
<title>HammGrid</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0f2b46">
<body>
  <div class="topbar" id="topbar"></div>
  <div class="app-shell">
    <div class="sidebar" id="sidebar"></div>
    <div class="shell-content">
      <main class="wide">
        <h1>Invite / Share links</h1>
        <p class="muted">Tokenized links for contractors and consultants - no account required. Revoke or adjust access anytime below.</p>

        <div class="card">
          <h2>New share link</h2>
          <form id="new-share-form">
            <div class="form-grid">
              <div class="field">
                <label>Link name / recipient</label>
                <input id="share-name" placeholder="e.g. ABC Contracting" autocomplete="off">
              </div>
              <div class="field">
                <label>Scope</label>
                <select id="share-scope">
                  <option value="live">Live (always current)</option>
                  <option value="snapshot">Snapshot (frozen at a revision)</option>
                </select>
              </div>
              <div class="field" id="share-revision-field" style="display:none;">
                <label>Revision</label>
                <select id="share-revision"></select>
              </div>
              <div class="field">
                <label>Discipline</label>
                <select id="share-discipline">
                  <option value="">All disciplines</option>
                </select>
              </div>
              <div class="field">
                <label>Expires</label>
                <input type="date" id="share-expires">
              </div>
            </div>
            <div class="modal-actions" style="justify-content:flex-start;">
              <button type="button" id="new-share-permissions">Permissions: Live Drawings</button>
              <button class="primary" type="submit">Create link</button>
            </div>
          </form>
        </div>

        <div class="card">
          <table id="shares-table">
            <thead><tr><th>Name</th><th>Scope</th><th>Discipline</th><th>Expires</th><th>Created by</th><th>Status</th><th>Permissions</th><th>Link</th><th>Actions</th></tr></thead>
            <tbody></tbody>
          </table>
          <p class="muted" id="shares-empty-msg" style="display:none; padding: 4px 2px;">No share links yet - create one above.</p>
        </div>
      </main>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script type="module" src="/js/shares.js"></script>
  <script type="module" src="/js/pwa.js"></script>
</body>
