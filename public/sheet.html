<title>Sheet — Drawing App</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#2563eb">
<body>
  <header>
    <a href="/dashboard.html">Drawing App</a>
    <div class="row">
      <span id="whoami" class="muted"></span>
      <button id="logout">Sign out</button>
    </div>
  </header>
  <main>
    <p><a id="back-link" href="#">&larr; Sheets</a></p>
    <h1 id="sheet-number"></h1>
    <p class="muted" id="sheet-title"></p>

    <div class="row" id="markup-toolbar">
      <button class="tool-btn" data-tool="select">Select</button>
      <button class="tool-btn" data-tool="line">Line</button>
      <button class="tool-btn" data-tool="arrow">Arrow</button>
      <button class="tool-btn" data-tool="rect">Rectangle</button>
      <button class="tool-btn" data-tool="cloud">Cloud</button>
      <button class="tool-btn" data-tool="text">Text</button>
      <label>Color: <input type="color" id="markup-color" value="#e11d48"></label>
      <label>Width: <input type="number" id="markup-width" value="2" min="1" max="10" style="width:50px;"></label>
      <label id="publish-default-wrap" style="display:none;"><input type="checkbox" id="markup-publish-default"> Draw as published</label>
    </div>

    <div class="row" style="align-items: flex-start;">
      <div style="flex: 1; min-width: 0;">
        <div class="pdf-viewer-wrap">
          <div class="markup-stage">
            <canvas id="pdf-canvas"></canvas>
            <svg id="markup-svg"></svg>
          </div>
        </div>
        <p class="muted" id="pdf-status"></p>
      </div>
      <div class="card" style="width: 260px; flex-shrink: 0;">
        <h3>Version history</h3>
        <ul class="version-list" id="version-list"></ul>
        <h3>Markups</h3>
        <ul class="markup-list" id="markup-list"></ul>
      </div>
    </div>

    <div class="card" id="compare-card" style="display:none;">
      <h2>Compare versions</h2>
      <div class="row">
        <label>Old (red):
          <select id="compare-old"></select>
        </label>
        <label>New (cyan):
          <select id="compare-new"></select>
        </label>
        <button id="compare-reset">Reset alignment</button>
      </div>
      <p class="muted">Drag the image to shift. Use the scale slider to nudge size. Unchanged lines are black; removed content is red; added content is cyan.</p>
      <div class="row">
        <label>Scale: <input type="range" id="compare-scale" min="0.9" max="1.1" step="0.002" value="1"></label>
      </div>
      <div class="pdf-viewer-wrap">
        <canvas id="compare-canvas"></canvas>
      </div>
      <p class="muted" id="compare-status"></p>
    </div>
  </main>
  <script src="/js/api.js"></script>
  <script type="module" src="/js/sheet.js"></script>
  <script type="module" src="/js/pwa.js"></script>
</body>
