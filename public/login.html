<title>Sign in — Drawing App</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#2563eb">
<body>
  <main style="max-width:360px; margin-top:80px;">
    <div class="card">
      <h1>Sign in</h1>
      <form id="login-form">
        <div class="row" style="flex-direction:column; align-items:stretch;">
          <label>Username<br><input id="username" required autofocus></label>
          <label>Password<br><input id="password" type="password" required></label>
          <button class="primary" type="submit">Sign in</button>
        </div>
      </form>
      <p class="error" id="error" style="display:none;"></p>
    </div>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
  <script type="module" src="/js/pwa.js"></script>
</body>
